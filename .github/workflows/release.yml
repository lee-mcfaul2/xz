# Generated by slsa-autotools
# https://github.com/lee-mcfaul2/slsa-autotools @ 3ff1907cb0fd9f8570c50b2b2886800f747d442e
#
# Reproducible release workflow.
#
# Triggered by pushing a tag matching v*. Produces tarballs that
# anyone can rebuild from the tagged commit and byte-compare.
# Signs them two ways (SLSA build provenance + detached cosign
# bundle). Publishes as a DRAFT release — the maintainer then
# downloads the artifacts locally, signs each with their GPG
# key, uploads the resulting .asc files, and flips the draft
# to published.
#
# Why draft + manual GPG?  In the traditional autotools release
# flow, the maintainer builds and signs the same laptop — one
# compromised machine forges everything. Moving the build into
# CI with SLSA + cosign gives anyone a way to verify the bytes
# without trusting the maintainer at all. The GPG signature then
# does a different, narrower job: it attests that the maintainer
# personally approved this specific release. Integrity is handled
# by attestations; approval is handled by GPG. Different trust
# surfaces, stacked.
#
# Reproducibility controls:
#   - **Pinned builder image**: this workflow runs inside
#     ghcr.io/<owner>/<repo>/builder, digest-pinned below. Every
#     byte of the build environment is addressable by that digest.
#   - **SOURCE_DATE_EPOCH** derived from the tagged commit, so any
#     timestamp the build could embed is a function of git content.
#   - **TAR_OPTIONS** normalizes ownership, permissions, ordering,
#     and clamps mtimes to the commit timestamp.
#   - **Manual tar + gzip --no-name --best** instead of `make
#     dist-xz` / `dist-gzip`. The automake recipes have known
#     reproducibility issues (e.g., modern gzip ignores the GZIP
#     env var automake uses to pass --no-name).
#   - **POT-Creation-Date normalization** in any .po/.pot files
#     that exist — harmless for projects without gettext, essential
#     for those that use it (xgettext stamps wall-clock into that
#     field).
#   - **Two-pass check**: the tarball is built twice in independent
#     trees; the job fails if they differ byte-for-byte.
#   - **Liar-detector**: size floor plus a manifest diff (files
#     declared by make distdir vs. files in the tarball).
#
# Verifying a published release (after the maintainer has signed
# and published):
#
#   # SLSA provenance — tarball came from this workflow at the
#   # tagged commit.
#   gh attestation verify <pkg>.tar.gz \
#       --repo <owner>/<repo> \
#       --signer-workflow <owner>/<repo>/.github/workflows/release.yml
#
#   # cosign detached signature — same sigstore trust chain,
#   # works without gh.
#   cosign verify-blob \
#       --bundle <pkg>.tar.gz.sigstore --new-bundle-format \
#       --certificate-identity \
#         'https://github.com/<owner>/<repo>/.github/workflows/release.yml@refs/tags/<tag>' \
#       --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#       <pkg>.tar.gz
#
#   # maintainer GPG signature — attests approval, not bytes.
#   gpg --verify <pkg>.tar.gz.asc <pkg>.tar.gz

name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Build, attest, sign, draft
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:b9bf5383ae53d40dc13481f740c952c9dfd7e0e632009359cc355aa2dfc04387
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      # Create the release and upload artifacts.
      contents: write
      # Publish the SLSA attestation.
      attestations: write
      # Mint the short-lived OIDC token for keyless sigstore signing.
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need history so we can read the tag commit's timestamp
          # for SOURCE_DATE_EPOCH.
          fetch-depth: 0
          persist-credentials: false

      - name: Mark workspace as safe for git
        # The pinned container's git config is registered for '*',
        # but the workspace is still flagged as dubious ownership
        # when checkout runs as a different uid than the container's
        # default. Explicit safe.directory add is cheap insurance.
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"
          echo "Version: ${VERSION}"
          echo "SDE:     ${SDE}"

      - name: Bootstrap autotools
        # Same logic as slsa-autotools scan.yml: prefer a project
        # hook, then autogen.sh / bootstrap, with an autoreconf
        # fallback for projects whose autogen is a guard-rail
        # script that refuses to run without a developer flag.
        run: |
          set -euo pipefail
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          else
            if   [ -x autogen.sh ]; then ./autogen.sh || true
            elif [ -x bootstrap ]; then  ./bootstrap  || true
            fi
            if [ ! -x ./configure ] && { [ -f configure.ac ] || [ -f configure.in ]; }; then
              echo "bootstrap did not produce ./configure; falling back to autoreconf -fi"
              autoreconf -fi
            fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Build tarball (first pass)
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          mkdir build1
          cd build1
          ../configure --quiet
          make -s distdir
          # make distdir creates a directory named <pkg>-<version>
          # in the build tree. There's exactly one; glob and read
          # it so we don't need to hardcode the package name.
          DISTDIR=$(ls -d */ | head -1 | sed 's,/$,,')
          [ -n "${DISTDIR}" ] && [ -d "${DISTDIR}" ] \
            || { echo "ERROR: make distdir produced no staging directory"; exit 1; }
          echo "distdir=${DISTDIR}" >> "$GITHUB_ENV"
          # POT-Creation-Date normalization. xgettext stamps wall-
          # clock time into this field; po4a propagates the stamp
          # into every translation file. Harmless no-op if the
          # project has no po/.
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${DISTDIR}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          # Snapshot the expected manifest (files that the build
          # system says the tarball should contain) for the
          # liar-detector step.
          ( cd "${DISTDIR}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > ../pass1.expected.txt
          # Tar the staging dir ourselves. Use the same GNU tar
          # the toolchain ships; the difference from `make
          # dist-xz` is that we don't re-run the distdir recipe
          # as a prereq, so our POT-Creation-Date sed is durable.
          tar --format=ustar -cf "../${DISTDIR}.tar" "${DISTDIR}"
          mkdir -p ../artifacts/pass1
          cd ..
          gzip -c --no-name --best "${DISTDIR}.tar" > "artifacts/pass1/${DISTDIR}.tar.gz"
          # Also emit .tar.xz if xz-utils is in the image.
          if command -v xz >/dev/null 2>&1; then
            xz -c --threads=1 "${DISTDIR}.tar" > "artifacts/pass1/${DISTDIR}.tar.xz"
          fi
          rm -f "${DISTDIR}.tar"
          # Re-snapshot from the produced .tar.gz to catch any
          # delta between distdir-listing and actually-shipped.
          ( cd artifacts/pass1 \
            && gunzip -c "${DISTDIR}.tar.gz" \
             | tar -tf - \
             | sed "s,^${DISTDIR}/,,;s,/$,," \
             | grep -v '^$' \
             | LC_ALL=C sort ) > pass1.actual.txt

      - name: Build tarball (second pass, independent)
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          mkdir build2
          cd build2
          ../configure --quiet
          make -s distdir
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${distdir}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          ( cd "${distdir}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > ../pass2.expected.txt
          tar --format=ustar -cf "../${distdir}.tar" "${distdir}"
          mkdir -p ../artifacts/pass2
          cd ..
          gzip -c --no-name --best "${distdir}.tar" > "artifacts/pass2/${distdir}.tar.gz"
          if command -v xz >/dev/null 2>&1; then
            xz -c --threads=1 "${distdir}.tar" > "artifacts/pass2/${distdir}.tar.xz"
          fi
          rm -f "${distdir}.tar"
          ( cd artifacts/pass2 \
            && gunzip -c "${distdir}.tar.gz" \
             | tar -tf - \
             | sed "s,^${distdir}/,,;s,/$,," \
             | grep -v '^$' \
             | LC_ALL=C sort ) > pass2.actual.txt

      - name: Liar-detector (size floor and manifest match)
        # Exit 0 from the build steps is not a statement of
        # correctness. Catches empty-tarball / tar-pipeline-failure
        # class of bugs.
        run: |
          set -euo pipefail
          MIN_SIZE=32768    # 32 KiB. Deliberately low; many real
                            # autotools projects produce small
                            # tarballs at 0.x versions. Project
                            # maintainers can tune.
          for pass in pass1 pass2; do
            TB="artifacts/${pass}/${distdir}.tar.gz"
            SIZE=$(wc -c < "${TB}")
            if [ "${SIZE}" -lt "${MIN_SIZE}" ]; then
              echo "FAIL: ${pass} tarball suspiciously small: ${SIZE} < ${MIN_SIZE}"
              exit 1
            fi
            if ! diff -u "${pass}.expected.txt" "${pass}.actual.txt" > /tmp/manifest.diff; then
              echo "FAIL: ${pass} tarball manifest does not match distdir declaration:"
              cat /tmp/manifest.diff
              exit 1
            fi
            echo "OK: ${pass} ${SIZE} bytes, $(wc -l < ${pass}.actual.txt) entries, manifest matches"
          done

      - name: Verify reproducibility
        run: |
          set -eu
          sha256sum artifacts/pass1/* artifacts/pass2/*
          diff -q "artifacts/pass1/${distdir}.tar.gz" "artifacts/pass2/${distdir}.tar.gz"
          if [ -f "artifacts/pass1/${distdir}.tar.xz" ]; then
            diff -q "artifacts/pass1/${distdir}.tar.xz" "artifacts/pass2/${distdir}.tar.xz"
          fi
          echo "Reproducibility verified."

      - name: Diagnose tarball differences
        if: ${{ failure() }}
        # Only runs if the verify step above failed. Turns "the
        # hashes don't match" into "these specific files cause the
        # drift" for faster root-causing.
        run: |
          set -u
          mkdir -p diag
          echo "=== sha256 ==="
          sha256sum artifacts/pass1/* artifacts/pass2/* || true
          echo
          echo "=== inner .tar sha256 ==="
          gunzip -c "artifacts/pass1/${distdir}.tar.gz" > diag/pass1.tar || true
          gunzip -c "artifacts/pass2/${distdir}.tar.gz" > diag/pass2.tar || true
          sha256sum diag/pass1.tar diag/pass2.tar || true
          echo
          echo "=== first differing byte ==="
          cmp diag/pass1.tar diag/pass2.tar || true
          echo
          echo "=== tar listing diff ==="
          tar tvf diag/pass1.tar > diag/p1.list || true
          tar tvf diag/pass2.tar > diag/p2.list || true
          diff -u diag/p1.list diag/p2.list | head -200 || true

      - name: Assemble release artifacts
        run: |
          set -eu
          mkdir -p release
          cp "artifacts/pass1/${distdir}".tar.* release/
          cd release
          sha256sum "${distdir}".tar.* > SHA256SUMS
          cat SHA256SUMS

      - name: SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release/${{ env.distdir }}.tar.*

      - name: Sign each artifact with cosign
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          # cosign is installed inside the pinned builder image.
          # Same keyless-OIDC flow used by the SLSA attestation —
          # Fulcio cert, Rekor log, ephemeral key, same trust root.
          for f in "release/${distdir}".tar.*; do
            [ -f "${f}" ] || continue
            case "${f}" in *.sigstore) continue ;; esac
            cosign sign-blob --bundle "${f}.sigstore" --new-bundle-format "${f}"
          done
          ls -la release/

      - name: Build release notes
        run: |
          set -eu
          {
            echo "## Release ${VERSION}"
            echo
            echo "This release was produced by an automated GitHub Actions"
            echo "workflow from the tagged commit. Every artifact is"
            echo "reproducible bit-for-bit and signed by the workflow's"
            echo "OIDC identity."
            echo
            echo "**This release is currently a DRAFT.** The maintainer will"
            echo "manually sign each artifact with their GPG key and attach"
            echo "the resulting \`.asc\` files before publishing."
            echo
            echo "### Build provenance"
            echo
            echo "- **Commit:**              \`${GITHUB_SHA}\`"
            echo "- **Tag:**                 \`${GITHUB_REF_NAME}\`"
            echo "- **SOURCE_DATE_EPOCH:**   \`${SDE}\`"
            echo "- **Builder image:**       \`ghcr.io/${{ github.repository }}/builder@sha256:b9bf5383ae53d40dc13481f740c952c9dfd7e0e632009359cc355aa2dfc04387\`"
            echo "- **Workflow:**            \`${{ github.workflow_ref }}\`"
            echo
            echo "### Checksums"
            echo
            echo '```'
            cat release/SHA256SUMS
            echo '```'
            echo
            echo "### Verifying"
            echo
            echo "Each artifact ships with a sigstore bundle (\`*.sigstore\`)"
            echo "and, once the maintainer publishes, a GPG detached"
            echo "signature (\`*.asc\`)."
            echo
            echo "**SLSA provenance (needs the \`gh\` CLI):**"
            echo '```'
            for f in release/*.tar.*; do
              [ -f "${f}" ] || continue
              case "${f}" in *.sigstore) continue ;; esac
              base=$(basename "${f}")
              echo "gh attestation verify ${base} \\"
              echo "    --repo ${{ github.repository }} \\"
              echo "    --signer-workflow ${{ github.repository }}/.github/workflows/release.yml"
            done
            echo '```'
            echo
            echo "**cosign detached signature (works without \`gh\`):**"
            echo '```'
            for f in release/*.tar.*; do
              [ -f "${f}" ] || continue
              case "${f}" in *.sigstore) continue ;; esac
              base=$(basename "${f}")
              echo "cosign verify-blob \\"
              echo "    --bundle ${base}.sigstore --new-bundle-format \\"
              echo "    --certificate-identity \\"
              echo "      'https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}' \\"
              echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
              echo "    ${base}"
            done
            echo '```'
            echo
            echo "**GPG (after the maintainer publishes):**"
            echo '```'
            for f in release/*.tar.*; do
              [ -f "${f}" ] || continue
              case "${f}" in *.sigstore) continue ;; esac
              base=$(basename "${f}")
              echo "gpg --verify ${base}.asc ${base}"
            done
            echo '```'
          } > release_notes.md
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SDE: ${{ steps.meta.outputs.sde }}

      - name: Create DRAFT release
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Draft so the maintainer can GPG-sign locally before
          # publishing. Prerelease tags (alpha/beta/rc/demo) are
          # flagged as prereleases; stable tags are not.
          PRERELEASE=""
          case "${VERSION}" in
            *alpha*|*beta*|*rc*|*demo*|*pre*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            --draft \
            ${PRERELEASE} \
            release/${distdir}.tar.* \
            release/SHA256SUMS

      - name: Maintainer action needed
        run: |
          {
            echo "### Draft release created"
            echo
            echo "Next step: **sign the artifacts with your GPG key and publish.**"
            echo
            echo '```'
            echo "# From a machine with your GPG private key:"
            echo "gh release download ${GITHUB_REF_NAME} -R ${{ github.repository }}"
            echo "for f in *.tar.*; do"
            echo "  case \"\$f\" in *.sigstore|*.asc) continue ;; esac"
            echo "  gpg --detach-sign --armor \"\$f\""
            echo "done"
            echo "gh release upload ${GITHUB_REF_NAME} *.asc -R ${{ github.repository }}"
            echo "gh release edit   ${GITHUB_REF_NAME} --draft=false -R ${{ github.repository }}"
            echo '```'
            echo
            echo "The \`--detach-sign --armor\` flags produce \`.asc\` files that"
            echo "sit alongside the original artifacts. The tarball bytes are"
            echo "untouched, so existing SLSA and cosign signatures remain"
            echo "valid after publication."
          } >> "$GITHUB_STEP_SUMMARY"
