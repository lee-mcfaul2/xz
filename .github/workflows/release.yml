# SPDX-License-Identifier: 0BSD
#
# Reproducible release workflow.
#
# Goal: given the git source at tag vX.Y.Z, produce a byte-identical source
# tarball that anyone can independently rebuild and verify. This defends
# against the class of attack seen in CVE-2024-3094, where a release tarball
# uploaded by a maintainer contained files not present in the git repo.
#
# Reproducibility controls applied:
#
#   - **SHA-pinned container image.** The release job runs inside
#     `ubuntu@sha256:c4a8d550…` (the current `ubuntu:24.04` digest at
#     the time this workflow was written). This matters: GitHub's
#     `ubuntu-24.04` runner image is an Azure VM image that is NOT
#     publicly pullable, so pinning `runs-on` alone gives you a label
#     over a drifting stream. Pinning by container digest gives you an
#     immutable artifact both CI and an external verifier can run via
#     `docker run ubuntu@sha256:…`. Note that a cleaner way of doing
#     this would be to publish a container with all dependencies
#     installed. It would save alot of lines in this file. But this
#     way is shown to demonstrate that you don't need to go that far
#     if you're fine with a messy workflow file. 
#
#   - **snapshot.ubuntu.com apt sources at a pinned timestamp.** The
#     default `archive.ubuntu.com` only hosts the current version of
#     each package; old versions vanish within days of a security
#     update, so plain version pins break. `snapshot.ubuntu.com`
#     exposes Ubuntu's full historical archive (backed by Launchpad)
#     as a time-indexed apt repository. Pinning to a specific
#     timestamp keeps the install deterministic indefinitely.
#
#   - **Bootstrap dance for ca-certificates.** The minimal
#     `ubuntu:24.04` image doesn't ship ca-certificates, but snapshot
#     enforces HTTPS, so we can't `apt-get install` from it without
#     certs. We install ca-certificates from the default HTTP archive
#     first (apt still GPG-verifies the package), then switch sources
#     to snapshot. ca-certificates doesn't end up in the tarball, so
#     this one-time drift doesn't affect reproducibility.
#
#   - **Version-pinned toolchain from the snapshot.** The ~10 packages
#     whose versions materially affect tarball bytes (autoconf,
#     automake, libtool, autopoint, gettext, po4a, tar, gzip, xz-utils,
#     git) are pinned explicitly.
#
#   - **SHA-pinned actions** prevent silent supply-chain drift on the
#     JS side (`actions/checkout`, `actions/attest-build-provenance`).
#
#   - **`SOURCE_DATE_EPOCH`** is derived from the tag commit timestamp,
#     so any timestamp the build could embed becomes a deterministic
#     function of the git content.
#
#   - **`TAR_OPTIONS` normalization** — `--owner=0 --group=0
#     --numeric-owner --mode=... --sort=name` plus
#     `--clamp-mtime --mtime=@$SOURCE_DATE_EPOCH`. The clamp is the
#     real fix for the distdir-mkdir-mtime drift, not a workaround.
#
#   - **Upstream sanity check.** `src/liblzma/validate_map.sh` runs
#     before the build, matching what upstream's `mydist` target does
#     before shipping a release.
#
#   - **POT-Creation-Date normalization in .po/.pot files.** xgettext
#     0.21 (as packaged in the snapshot) does not honor
#     `SOURCE_DATE_EPOCH` for the `POT-Creation-Date` field when
#     invoked via automake's nested make; and po4a propagates that
#     wall-clock stamp into every translation file it touches. A
#     targeted `sed` over every `.po`/`.pot` file in the staging dir
#     normalizes this. Upstream fix: gettext issue / patch forthcoming.
#
#   - **Direct tar instead of `make dist-xz`.** `make dist-xz` re-runs
#     the distdir recipe as a prereq, which regenerates xz.pot with a
#     fresh wall-clock stamp and undoes our sed. We tar the staging
#     directory ourselves — same `tar`, same `xz`, same `gzip` binaries
#     automake would have used, just directly so we control ordering.
#     `make dist-gzip` is also skipped because modern gzip ignores the
#     GZIP env var automake uses to pass `--no-name`, making its output
#     irreparably non-reproducible. The `.tar.gz` is produced by piping
#     the same tar through `gzip --no-name --best`, where CLI flags
#     are honored.
#
#   - **Two-pass reproducibility check.** The tarball is built twice
#     in independent trees and byte-diffed. The job fails if they
#     disagree, so the claim is re-proven on every release rather
#     than asserted.
#
#   - **Liar-detector on the output.** A size floor + a mechanical
#     manifest diff (tarball contents vs `distdir` listing) prevents
#     silent empty-tarball publication. Exit 0 is not a statement of
#     correctness; a manifest match against the build system's own
#     declaration is.
#
# Provenance and signing:
#   - A SLSA v1 build provenance attestation is produced for each
#     tarball via actions/attest-build-provenance. Signing is keyless:
#     the workflow's OIDC identity issues a short-lived Fulcio
#     certificate, the attestation is logged to the Rekor transparency
#     log, and the resulting bundle is published to GitHub's
#     attestations API.
#   - A raw-artifact signature is also produced for each tarball via
#     `cosign sign-blob`, packaged as a .sigstore bundle file that
#     ships as a release asset. This uses the same sigstore
#     infrastructure (Fulcio + Rekor) with the same keyless OIDC
#     identity, but gives consumers a vendor-neutral verification
#     path via `cosign verify-blob` that does not depend on GitHub's
#     attestation API. Same underlying trust; two complementary
#     delivery formats.
#   - No long-lived signing key exists, so there is nothing for a
#     compromised action to steal for future replay.

name: Release

on:
  push:
    tags:
      - 'v*'

# Default to no permissions; jobs opt-in to what they need.
permissions: {}

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential po4a autopoint doxygen libtool

      - name: Build and test
        run: ./build-aux/ci_build.bash -b autotools -p all

  source:
    name: Build source tarball, verify, sign
    needs: test
    runs-on: ubuntu-24.04
    # Run all steps of this job inside a SHA-pinned ubuntu:24.04 base
    # image. The digest below was resolved from `docker pull ubuntu:24.04`
    # and is the artifact an external verifier should use with
    # `docker run ubuntu@sha256:<digest>` to reproduce the release bytes.
    container:
      image: ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b
    # In a container: job, GitHub's default shell is `sh` (which on
    # Ubuntu is dash and does NOT support `set -o pipefail`). Force
    # bash so our scripts' pipefail and other bashisms work.
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      # No code-write needed: this job produces artifacts and signs them;
      # the separate `publish` job is the only one with contents: write.
      contents: read
      # Required to publish the build provenance attestation.
      attestations: write
      # Required to mint the short-lived OIDC token used for keyless signing.
      # The token is ephemeral (minutes) and scoped to this workflow run, so
      # it cannot be exfiltrated for later reuse.
      id-token: write
    steps:
      # Must run BEFORE actions/checkout. The minimal ubuntu:24.04 base
      # image has no git, which would force actions/checkout into its
      # REST-API fallback — that writes a working tree without a .git/
      # directory, breaking every later step that needs `git log`. This
      # step is from the default Ubuntu archive (not the snapshot pin);
      # git here is only used to clone, not to build, and does not end
      # up in the tarball, so its version is not part of the
      # reproducibility surface.
      - name: Bootstrap git (pre-checkout)
        shell: sh
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need full history so the tag's commit timestamp can be read
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies (snapshot-pinned)
        env:
          # Ubuntu apt archive snapshot timestamp. Change this to pick up
          # a newer toolchain; keep it constant to preserve the build's
          # reproducibility over time. Any valid YYYYMMDDTHHMMSSZ that
          # snapshot.ubuntu.com serves will work.
          SNAPSHOT_TS: '20260422T180000Z'
        run: |
          set -euo pipefail
          # Step 1: bootstrap ca-certificates from the default archive.
          # ubuntu:24.04 ships no certs but does ship with apt's GPG
          # keyring, so the initial install is GPG-verified even though
          # HTTP is used (no TLS possible yet — that's the whole point).
          apt-get update -qq
          apt-get install -y --no-install-recommends ca-certificates
          # Step 2: swap apt sources to snapshot.ubuntu.com at the pinned
          # timestamp. Packages from here are immutable indefinitely.
          cat > /etc/apt/sources.list <<APT
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble-updates main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble-security main restricted universe multiverse
          APT
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          apt-get update -qq
          # Step 3: install toolchain. Versions pinned for packages whose
          # versions can affect tarball bytes; other packages
          # (build-essential, doxygen) are not pinned because they don't
          # end up in the shipped tarball.
          apt-get install -y --no-install-recommends \
            git=1:2.43.0-1ubuntu7.3 \
            curl \
            xz-utils=5.6.1+really5.4.5-1ubuntu0.2 \
            autoconf=2.71-3 \
            automake=1:1.16.5-1.3ubuntu1 \
            libtool=2.4.7-7build1 \
            autopoint=0.21-14ubuntu2 \
            gettext=0.21-14ubuntu2 \
            po4a=0.69-1 \
            build-essential \
            doxygen \
            gh=2.45.0-1build1
          # actions/checkout runs before this step and registers the
          # workspace as a git "safe" directory, but only for the
          # runner user. Re-register for root (our container user).
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          # Install cosign (sigstore CLI) from its official GitHub release
          # with SHA256 verification. Not in Ubuntu apt, so we pull the
          # binary directly. This pins by exact bytes, so the signing tool
          # itself is part of the reproducible build surface.
          COSIGN_VERSION=v3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          echo "${COSIGN_SHA256}  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign
          cosign version --json | head -3

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          # Two distinct concepts, historically conflated:
          #   VERSION     — the git tag with the leading `v` stripped.
          #                 Used for the release title and notes only,
          #                 so demo tags like `v5.8.3-demo1` read
          #                 correctly in the GitHub UI.
          #   PACKAGE_VER — the canonical package version that
          #                 configure.ac / AC_INIT reads from
          #                 src/liblzma/api/lzma/version.h via
          #                 build-aux/version.sh. This is the name
          #                 `make distdir` uses for the staging
          #                 directory and therefore what every
          #                 tarball / zip / 7z file is named after.
          # File paths must use PACKAGE_VER; human labels use VERSION.
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VER=$(sh build-aux/version.sh)
          # Timestamp of the commit pointed to by the tag — deterministic
          # across reruns and independent of when CI happens to execute.
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "package_ver=${PACKAGE_VER}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"

      - name: Validate liblzma filter map
        # Upstream's `mydist` target runs this before shipping; it
        # catches inconsistencies in liblzma's internal filter table.
        # We replicate it here so the CI pipeline matches the maintainer
        # sanity check rather than skipping it.
        run: sh ./src/liblzma/validate_map.sh

      - name: Generate build system
        # Runs autoconf/automake and po4a (producing translated man
        # pages). po4a is enabled so the tarball contains the full
        # set of translations upstream ships.
        run: ./autogen.sh

      - name: Build tarball (first pass)
        env:
          # --clamp-mtime + --mtime=@SDE clamps any mtime later than
          # the tag commit down to the tag commit (normalizing distdir
          # mkdir time and autopoint-touched files) while preserving
          # older file mtimes verbatim. reproducible-builds.org pattern.
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir build1
          cd build1
          ../configure --quiet
          mkdir -p ../artifacts
          # Step A: populate the distdir staging directory. This is the
          # build system's canonical declaration of what the tarball
          # should contain (copied files + dist-hook output).
          make -s distdir
          # Step B: normalize POT-Creation-Date across every .po/.pot
          # file. xgettext and po4a both stamp wall-clock time into
          # these files despite SOURCE_DATE_EPOCH being set in env.
          # Rewrite to a deterministic value derived from SDE.
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "xz-${VER}/po" "xz-${VER}/po4a" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} +
          # Step C: snapshot the expected manifest (files declared-by-
          # build-system). Used later for the liar-detector check.
          ( cd "xz-${VER}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > ../artifacts/pass1.expected.txt
          # Step D: tar the staging dir ourselves. We do NOT use
          # `make dist-xz`: it would re-run the distdir recipe as a
          # prerequisite and undo the sed above. Direct tar uses the
          # same GNU tar binary automake would invoke, honoring
          # TAR_OPTIONS from env.
          tar --format=ustar -cf "xz-${VER}.tar" "xz-${VER}"
          xz   -c       < "xz-${VER}.tar" > "xz-${VER}.tar.xz"
          gzip -c --no-name --best < "xz-${VER}.tar" > "xz-${VER}.tar.gz"
          rm   "xz-${VER}.tar"
          # Step E: snapshot the actual manifest (files in the tarball)
          # for the liar-detector diff.
          tar tJf "xz-${VER}.tar.xz" | sed "s,^xz-${VER}/,,;s,/$,," \
              | grep -v '^$' | LC_ALL=C sort > ../artifacts/pass1.actual.txt
          mkdir -p ../artifacts/pass1
          cp "xz-${VER}.tar.gz" ../artifacts/pass1/
          cp "xz-${VER}.tar.xz" ../artifacts/pass1/

      - name: Build tarball (second pass, independent)
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir build2
          cd build2
          ../configure --quiet
          mkdir -p ../artifacts
          make -s distdir
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "xz-${VER}/po" "xz-${VER}/po4a" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} +
          ( cd "xz-${VER}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > ../artifacts/pass2.expected.txt
          tar --format=ustar -cf "xz-${VER}.tar" "xz-${VER}"
          xz   -c       < "xz-${VER}.tar" > "xz-${VER}.tar.xz"
          gzip -c --no-name --best < "xz-${VER}.tar" > "xz-${VER}.tar.gz"
          rm   "xz-${VER}.tar"
          tar tJf "xz-${VER}.tar.xz" | sed "s,^xz-${VER}/,,;s,/$,," \
              | grep -v '^$' | LC_ALL=C sort > ../artifacts/pass2.actual.txt
          mkdir -p ../artifacts/pass2
          cp "xz-${VER}.tar.gz" ../artifacts/pass2/
          cp "xz-${VER}.tar.xz" ../artifacts/pass2/

      # Liar-detector: exit 0 from the build steps does NOT mean the
      # tarball is correct. Two checks here:
      #   (1) Size floor — catches empty-tarball class of failure.
      #       Earlier iterations of this workflow published 108-byte
      #       empty tarballs because a silent failure inside make's
      #       own pipeline survived set -eu.
      #   (2) Manifest match — the tarball's file listing must equal
      #       the populated distdir's listing. The distdir is the
      #       build system's canonical declaration of what the tarball
      #       should contain, so deriving expectations from it (rather
      #       than hardcoding filenames) is mechanical and survives
      #       source-tree refactors. An extra file injected by a
      #       compromised dist-hook and a missing file from a
      #       truncated tar both fail this assertion.
      - name: Verify tarball matches build system's declared manifest
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          MIN_SIZE=524288   # 512 KB; real xz-5.8.3.tar.xz is ~2.6 MB
          for pass in pass1 pass2; do
            TB="artifacts/${pass}/xz-${VER}.tar.xz"
            SIZE=$(wc -c < "$TB")
            if [ "$SIZE" -lt "$MIN_SIZE" ]; then
              echo "FAIL: ${pass} tarball is suspiciously small: ${SIZE} bytes (< ${MIN_SIZE})"
              exit 1
            fi
            EXPECTED="artifacts/${pass}.expected.txt"
            ACTUAL="artifacts/${pass}.actual.txt"
            if ! diff -u "$EXPECTED" "$ACTUAL" > /tmp/manifest.diff; then
              echo "FAIL: ${pass} tarball does not match the distdir manifest"
              echo "      (declared-by-build-system vs actually-in-tarball, unified diff:)"
              cat /tmp/manifest.diff
              exit 1
            fi
            ENTRIES=$(wc -l < "$ACTUAL")
            echo "OK: ${pass} tarball: ${SIZE} bytes, ${ENTRIES} entries, manifest matches distdir"
          done

      - name: Verify reproducibility
        run: |
          set -eu
          cd artifacts
          sha256sum pass1/* pass2/*
          # Compare pass1 vs pass2 byte-for-byte. Any mismatch here means
          # the build still has a non-deterministic input — do NOT publish.
          diff -q pass1/xz-${{ steps.meta.outputs.package_ver }}.tar.gz \
                  pass2/xz-${{ steps.meta.outputs.package_ver }}.tar.gz
          diff -q pass1/xz-${{ steps.meta.outputs.package_ver }}.tar.xz \
                  pass2/xz-${{ steps.meta.outputs.package_ver }}.tar.xz
          echo "Reproducibility verified: both independent builds match."

      # Diagnostic step — runs only when the verify step above has failed.
      # Extracts both tarballs and reports precisely which files differ
      # and in what way (content, mtime, permissions, ordering). Turns a
      # "the hashes don't match" failure into "these specific files are
      # the source of the non-determinism" for faster root-causing.
      - name: Diagnose tarball differences
        if: ${{ failure() }}
        run: |
          set -u
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir -p diag
          echo "=== sha256 of shipped .tar.xz ==="
          sha256sum artifacts/pass1/xz-${VER}.tar.xz \
                    artifacts/pass2/xz-${VER}.tar.xz
          echo
          echo "=== sha256 of inner .tar (after xz decompression) ==="
          xz -d --stdout artifacts/pass1/xz-${VER}.tar.xz > diag/pass1.tar
          xz -d --stdout artifacts/pass2/xz-${VER}.tar.xz > diag/pass2.tar
          sha256sum diag/pass1.tar diag/pass2.tar
          echo
          echo "=== First differing byte in inner .tar ==="
          cmp diag/pass1.tar diag/pass2.tar || true
          echo
          echo "=== tar listing diff (order, size, mtime, perms, owner) ==="
          tar tvf diag/pass1.tar > diag/pass1.listing || true
          tar tvf diag/pass2.tar > diag/pass2.listing || true
          diff -u diag/pass1.listing diag/pass2.listing | head -200 || true
          echo
          echo "=== Recursive content diff of extracted trees ==="
          mkdir -p diag/tree1 diag/tree2
          tar -xf diag/pass1.tar -C diag/tree1 || true
          tar -xf diag/pass2.tar -C diag/tree2 || true
          diff -r diag/tree1 diag/tree2 | head -200 || true

      - name: Produce release artifacts + checksums
        id: artifacts
        run: |
          set -eu
          mkdir -p release
          cp artifacts/pass1/xz-${{ steps.meta.outputs.package_ver }}.tar.gz release/
          cp artifacts/pass1/xz-${{ steps.meta.outputs.package_ver }}.tar.xz release/
          cd release
          sha256sum xz-${{ steps.meta.outputs.package_ver }}.tar.gz \
                    xz-${{ steps.meta.outputs.package_ver }}.tar.xz \
                    > SHA256SUMS

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.gz
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.xz

      # Complementary to the SLSA attestation: a raw-artifact signature
      # produced by cosign sign-blob, packaged as a .sigstore bundle
      # (signature + cert + Rekor entry in one file). This gives
      # consumers a second, simpler verification path via
      # `cosign verify-blob`, independent of GitHub's attestation API
      # and usable by anyone with the cosign CLI. Same sigstore
      # infrastructure underneath — Fulcio for the cert, Rekor for
      # transparency, ephemeral OIDC-bound private key.
      - name: Sign release artifacts with cosign (sigstore)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          for f in "release/xz-${VER}.tar.gz" "release/xz-${VER}.tar.xz"; do
            cosign sign-blob \
              --bundle "${f}.sigstore" \
              --new-bundle-format \
              "${f}"
          done
          ls -la release/

      # Hand artifacts off to the `publish` job, which combines them with
      # the windows job's artifacts into a single GitHub release.
      - name: Upload source artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-artifacts
          path: |
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.gz
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.xz
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.gz.sigstore
            release/xz-${{ steps.meta.outputs.package_ver }}.tar.xz.sigstore
          if-no-files-found: error
          retention-days: 1

  windows:
    # Cross-build Windows binaries (xz-X.Y.Z-windows.zip and .7z) from the
    # same git source, same pinned container, same snapshot timestamp, same
    # two-pass reproducibility check, same SLSA + cosign signing. Runs in
    # parallel with `source` — both depend on `test` and neither depends on
    # the other. The final `publish` job collects artifacts from both into
    # a single GitHub release.
    #
    # Design constraint: upstream's `windows/build.bash` is used byte-for-
    # byte unchanged. The three reproducibility hooks needed on top of it
    # are applied at the environment layer instead of via in-repo patches:
    #
    #   (A) Two thin gcc wrappers at /opt/wrappers/{i686,x86_64}-w64-mingw32-gcc
    #       exec the real cross-gcc with reproducibility flags prepended.
    #       build.bash's buildit() shadows env CFLAGS with its positional
    #       argument, so env-CFLAGS can't carry these flags; the wrappers
    #       make it unnecessary. `-Wl,*` is silently discarded on `-c`
    #       invocations and `-ffile-prefix-map` is inert at link time, so
    #       one flag set is safe on every call build.bash produces.
    #
    #   (B) A 7z wrapper at /opt/wrappers/7z clamps mtimes on everything in
    #       the packaging directory to SOURCE_DATE_EPOCH before delegating
    #       to the real 7z, only on `a`/`u` (archive create/update) calls.
    #       Without this, wall-clock mtimes set by `cp -v` / `mkdir` end
    #       up stored in the zip's directory entries.
    #
    #   (C) SOURCE_DATE_EPOCH is exported before running build.bash.
    #       Ghostscript >=9.55 honors it for PDF /CreationDate and /ModDate
    #       in the man-page PDFs, so no ps2pdf flag changes are needed.
    name: Build Windows binaries, verify, sign
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b
    defaults:
      run:
        shell: bash
    timeout-minutes: 60
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Bootstrap git (pre-checkout)
        shell: sh
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies (snapshot-pinned, with MinGW cross-toolchain)
        env:
          SNAPSHOT_TS: '20260422T180000Z'
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends ca-certificates
          cat > /etc/apt/sources.list <<APT
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble-updates main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ noble-security main restricted universe multiverse
          APT
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          apt-get update -qq
          # Same base autotools toolchain as the source job, plus:
          #   - mingw-w64 + binutils/gcc cross-compilers (i686 and x86_64)
          #   - groff + bsdextrautils (dist-hook needs groff for txt man
          #     pages and `col` from bsdextrautils for the pipeline; missing
          #     either causes dist-hook to silently skip the conversion or
          #     exit 127, which build.bash then fails on when it tries to
          #     copy doc/man/txt/xz.txt into the package)
          #   - 7zip for archive creation, ghostscript for PDF man pages
          apt-get install -y --no-install-recommends \
            git=1:2.43.0-1ubuntu7.3 \
            curl \
            xz-utils=5.6.1+really5.4.5-1ubuntu0.2 \
            autoconf=2.71-3 \
            automake=1:1.16.5-1.3ubuntu1 \
            libtool=2.4.7-7build1 \
            autopoint=0.21-14ubuntu2 \
            gettext=0.21-14ubuntu2 \
            po4a=0.69-1 \
            build-essential \
            doxygen \
            mingw-w64=11.0.1-3build1 \
            binutils-mingw-w64-i686=2.41.90.20240122-1ubuntu1+11.4 \
            binutils-mingw-w64-x86-64=2.41.90.20240122-1ubuntu1+11.4 \
            gcc-mingw-w64-i686=13.2.0-6ubuntu1+26.1 \
            gcc-mingw-w64-x86-64=13.2.0-6ubuntu1+26.1 \
            groff=1.23.0-3build2 \
            bsdextrautils=2.39.3-9ubuntu6.5 \
            7zip=23.01+dfsg-11 \
            ghostscript=10.02.1~dfsg1-0ubuntu7.8 \
            libgs10=10.02.1~dfsg1-0ubuntu7.8 \
            libgs10-common=10.02.1~dfsg1-0ubuntu7.8 \
            libgs-common=10.02.1~dfsg1-0ubuntu7.8
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          COSIGN_VERSION=v3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          echo "${COSIGN_SHA256}  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          # See the source job's meta step for the VERSION vs PACKAGE_VER
          # distinction. File paths must use PACKAGE_VER; human labels
          # use VERSION.
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VER=$(sh build-aux/version.sh)
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "package_ver=${PACKAGE_VER}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"

      - name: Install reproducibility wrappers
        # Everything needed to keep windows/build.bash byte-for-byte
        # unchanged from upstream while still getting deterministic output.
        # See the job-level comment for why each wrapper exists.
        run: |
          set -euo pipefail
          mkdir -p /opt/wrappers

          # (A) gcc wrappers, one per target triplet.
          for TRIPLET in i686-w64-mingw32 x86_64-w64-mingw32; do
            cat > "/opt/wrappers/${TRIPLET}-gcc" <<WRAP
          #!/bin/sh
          exec /usr/bin/${TRIPLET}-gcc \\
            "-ffile-prefix-map=\${DISTDIR_TOP}=." \\
            -Wl,--no-insert-timestamp \\
            -Wl,--build-id=none \\
            "\$@"
          WRAP
            chmod +x "/opt/wrappers/${TRIPLET}-gcc"
          done

          # (B) 7z wrapper. Pass-through on anything other than archive
          # create/update; clamp mtimes first on `a` and `u`.
          cat > /opt/wrappers/7z <<'WRAP'
          #!/bin/sh
          case "$1" in
            a|u)
              find . -exec touch --no-dereference -h -d "@${SOURCE_DATE_EPOCH}" {} + 2>/dev/null || true
              ;;
          esac
          exec /usr/bin/7z "$@"
          WRAP
          chmod +x /opt/wrappers/7z

          echo "PATH=/opt/wrappers:${PATH}" >> "$GITHUB_ENV"
          ls -l /opt/wrappers/

      - name: Validate liblzma filter map
        run: sh ./src/liblzma/validate_map.sh

      - name: Generate build system
        run: ./autogen.sh

      - name: Build Windows binaries (first pass)
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir build1
          cd build1
          ../configure --quiet
          make -s distdir
          # Same POT-Creation-Date normalization as the source job (same
          # gettext/po4a behavior, same sed). Without it the distdir would
          # drift run-to-run and the produced docs inside the zip would
          # too.
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "xz-${VER}/po" "xz-${VER}/po4a" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} +
          # Hand build.bash a working directory that it recognises (it
          # looks for windows/build.bash relative to cwd). DISTDIR_TOP is
          # what the gcc wrapper maps to "." in debug paths, so this must
          # be exported before build.bash invokes the compiler.
          cd "xz-${VER}"
          DISTDIR_TOP="$(pwd)"
          export DISTDIR_TOP
          bash windows/build.bash
          mkdir -p ../../artifacts/win-pass1
          cp "xz-${VER}-windows.zip" "xz-${VER}-windows.7z" ../../artifacts/win-pass1/

      - name: Build Windows binaries (second pass, independent)
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir build2
          cd build2
          ../configure --quiet
          make -s distdir
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "xz-${VER}/po" "xz-${VER}/po4a" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} +
          cd "xz-${VER}"
          DISTDIR_TOP="$(pwd)"
          export DISTDIR_TOP
          bash windows/build.bash
          mkdir -p ../../artifacts/win-pass2
          cp "xz-${VER}-windows.zip" "xz-${VER}-windows.7z" ../../artifacts/win-pass2/

      - name: Verify Windows reproducibility
        run: |
          set -eu
          VER=${{ steps.meta.outputs.package_ver }}
          cd artifacts
          sha256sum win-pass1/* win-pass2/*
          diff -q "win-pass1/xz-${VER}-windows.zip" "win-pass2/xz-${VER}-windows.zip"
          diff -q "win-pass1/xz-${VER}-windows.7z"  "win-pass2/xz-${VER}-windows.7z"
          echo "Windows reproducibility verified: both independent builds match."

      - name: Diagnose Windows differences
        if: ${{ failure() }}
        run: |
          set -u
          VER=${{ steps.meta.outputs.package_ver }}
          echo "=== sha256 of each pass ==="
          sha256sum artifacts/win-pass1/* artifacts/win-pass2/* || true
          echo
          echo "=== 7z listing diff (zip) ==="
          7z l "artifacts/win-pass1/xz-${VER}-windows.zip" > /tmp/p1.zip.list || true
          7z l "artifacts/win-pass2/xz-${VER}-windows.zip" > /tmp/p2.zip.list || true
          diff -u /tmp/p1.zip.list /tmp/p2.zip.list | head -200 || true

      - name: Sanity-check archive contents
        # Small liar-detector for the zip: check minimum size and verify
        # specific expected entries are present. Catches an empty or
        # truncated archive before it gets signed and published.
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          ZIP="artifacts/win-pass1/xz-${VER}-windows.zip"
          SEVENZ="artifacts/win-pass1/xz-${VER}-windows.7z"
          ZIP_MIN=524288   # 512 KB; real zip is ~1.1 MB
          SZ7_MIN=262144   # 256 KB; real .7z is ~650 KB
          ZIP_SIZE=$(wc -c < "$ZIP")
          SZ7_SIZE=$(wc -c < "$SEVENZ")
          [ "$ZIP_SIZE" -ge "$ZIP_MIN" ] || { echo "FAIL: zip too small ($ZIP_SIZE < $ZIP_MIN)"; exit 1; }
          [ "$SZ7_SIZE" -ge "$SZ7_MIN" ] || { echo "FAIL: 7z too small ($SZ7_SIZE < $SZ7_MIN)"; exit 1; }
          for expected in \
            bin_i686-sse2/xz.exe bin_i686-sse2/liblzma.dll \
            bin_x86-64/xz.exe bin_x86-64/liblzma.dll \
            doc/COPYING.MinGW-w64-runtime.txt; do
            7z l "$ZIP" | grep -q "  ${expected}$" \
              || { echo "FAIL: zip missing expected entry: ${expected}"; exit 1; }
          done
          echo "OK: zip ${ZIP_SIZE} bytes, 7z ${SZ7_SIZE} bytes, expected entries present"

      - name: Produce release artifacts + checksums
        run: |
          set -eu
          VER=${{ steps.meta.outputs.package_ver }}
          mkdir -p release
          cp "artifacts/win-pass1/xz-${VER}-windows.zip" release/
          cp "artifacts/win-pass1/xz-${VER}-windows.7z"  release/

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.zip
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.7z

      - name: Sign Windows artifacts with cosign (sigstore)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          VER=${{ steps.meta.outputs.package_ver }}
          for f in "release/xz-${VER}-windows.zip" "release/xz-${VER}-windows.7z"; do
            cosign sign-blob \
              --bundle "${f}.sigstore" \
              --new-bundle-format \
              "${f}"
          done
          ls -la release/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-artifacts
          path: |
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.zip
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.7z
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.zip.sigstore
            release/xz-${{ steps.meta.outputs.package_ver }}-windows.7z.sigstore
          if-no-files-found: error
          retention-days: 1

  publish:
    # Single place that produces the GitHub release. Collects artifacts
    # from both build jobs, builds a combined SHA256SUMS, constructs
    # release notes covering both artifact sets, and creates the release.
    # No container needed — this job does no building, so it runs on the
    # host runner where gh is pre-installed.
    name: Create GitHub release
    needs: [source, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      # The only job that writes to the repo.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Derive version
        id: meta
        run: |
          set -eu
          # See the source job's meta step for the VERSION vs PACKAGE_VER
          # distinction. File names are always xz-<PACKAGE_VER>; the
          # release title / notes use VERSION so demo tags read right.
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VER=$(sh build-aux/version.sh)
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "package_ver=${PACKAGE_VER}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"

      - name: Download source artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: source-artifacts
          path: release

      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-artifacts
          path: release

      - name: Build combined SHA256SUMS
        run: |
          set -eu
          VER=${{ steps.meta.outputs.package_ver }}
          cd release
          sha256sum \
            "xz-${VER}.tar.gz" \
            "xz-${VER}.tar.xz" \
            "xz-${VER}-windows.zip" \
            "xz-${VER}-windows.7z" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from NEWS
        run: |
          set -eu
          # NEWS section headers use the package version (e.g. "5.8.3 ("),
          # so demo tags like v5.8.3-demo1 must still look up the 5.8.3
          # NEWS section.
          PACKAGE_VER="${{ steps.meta.outputs.package_ver }}"
          VERSION_RE=$(printf '%s\n' "$PACKAGE_VER" | sed 's/\./\\./g')
          awk "
            /^${VERSION_RE} \(/ { found=1; next }
            found && /^[0-9]/  { exit }
            found              { print }
          " NEWS | sed '/./,$!d' | sed 's/[[:space:]]*$//' > release_notes.txt

      - name: Append reproducibility attestation to release notes
        run: |
          set -eu
          VER=${{ steps.meta.outputs.package_ver }}
          {
            echo ""
            echo "---"
            echo ""
            echo "## Build provenance"
            echo ""
            echo "- **Git commit:** \`${GITHUB_SHA}\`"
            echo "- **Tag:** \`${GITHUB_REF_NAME}\`"
            echo "- **SOURCE_DATE_EPOCH:** \`${{ steps.meta.outputs.sde }}\`"
            echo "- **Container:** \`ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b\`"
            echo "- **Apt snapshot:** \`snapshot.ubuntu.com/ubuntu/20260422T180000Z/\`"
            echo "- **Workflow:** \`${{ github.workflow_ref }}\`"
            echo ""
            echo "Both the source tarballs and the Windows binaries were built twice"
            echo "independently in this workflow run and each pair produced byte-identical"
            echo "output. The source and Windows builds run in parallel; both depend only"
            echo "on the pre-release test suite passing."
            echo ""
            echo '```'
            cat release/SHA256SUMS
            echo '```'
            echo ""
            echo "## Verifying the signatures"
            echo ""
            echo "Every published artifact has **two** sigstore-backed signatures —"
            echo "a SLSA v1 provenance attestation (verifiable via \`gh\`) and a"
            echo "detached raw-artifact signature (verifiable via \`cosign\`). Both are"
            echo "produced keylessly via this workflow's OIDC identity. No long-lived"
            echo "signing key exists."
            echo ""
            echo "### Option A — SLSA provenance (via \`gh\`)"
            echo ""
            echo '```'
            echo "gh attestation verify xz-${VER}.tar.xz \\"
            echo "    --repo ${{ github.repository }} \\"
            echo "    --signer-workflow ${{ github.repository }}/.github/workflows/release.yml"
            echo "gh attestation verify xz-${VER}-windows.zip \\"
            echo "    --repo ${{ github.repository }} \\"
            echo "    --signer-workflow ${{ github.repository }}/.github/workflows/release.yml"
            echo '```'
            echo ""
            echo "### Option B — detached signature (via \`cosign\`)"
            echo ""
            echo '```'
            echo "cosign verify-blob \\"
            echo "    --bundle xz-${VER}.tar.xz.sigstore \\"
            echo "    --new-bundle-format \\"
            echo "    --certificate-identity 'https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}' \\"
            echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "    xz-${VER}.tar.xz"
            echo "cosign verify-blob \\"
            echo "    --bundle xz-${VER}-windows.zip.sigstore \\"
            echo "    --new-bundle-format \\"
            echo "    --certificate-identity 'https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}' \\"
            echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "    xz-${VER}-windows.zip"
            echo '```'
            echo ""
            echo "Both options ultimately check the same sigstore trust chain (Fulcio"
            echo "certificate + Rekor transparency log entry)."
            echo ""
            echo "## Reproducing the artifacts from scratch"
            echo ""
            echo "On any machine with Docker, rebuild from the tagged git commit using"
            echo "the same pinned container the CI used:"
            echo ""
            echo '```'
            echo "docker run --rm ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b \\"
            echo "    bash -c 'apt-get update && apt-get install -y --no-install-recommends ca-certificates git \\"
            echo "      && git clone https://github.com/${{ github.repository }} /xz \\"
            echo "      && cd /xz && git checkout ${GITHUB_REF_NAME} \\"
            echo "      && # ... (see .github/workflows/release.yml source + windows jobs)'"
            echo '```'
          } >> release_notes.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # VERSION (tag-derived) goes in the release title / prerelease
          # gate; PACKAGE_VER names the actual files on disk.
          VERSION="${{ steps.meta.outputs.version }}"
          PACKAGE_VER="${{ steps.meta.outputs.package_ver }}"
          PRERELEASE=""
          case "$VERSION" in
            *alpha*|*beta*|*demo*|*rc*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "XZ Utils ${VERSION}" \
            --notes-file release_notes.txt \
            ${PRERELEASE} \
            "release/xz-${PACKAGE_VER}.tar.gz" \
            "release/xz-${PACKAGE_VER}.tar.xz" \
            "release/xz-${PACKAGE_VER}.tar.gz.sigstore" \
            "release/xz-${PACKAGE_VER}.tar.xz.sigstore" \
            "release/xz-${PACKAGE_VER}-windows.zip" \
            "release/xz-${PACKAGE_VER}-windows.7z" \
            "release/xz-${PACKAGE_VER}-windows.zip.sigstore" \
            "release/xz-${PACKAGE_VER}-windows.7z.sigstore" \
            release/SHA256SUMS
