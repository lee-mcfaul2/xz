# Generated by slsa-autotools
# https://github.com/lee-mcfaul2/slsa-autotools @ 3ff1907cb0fd9f8570c50b2b2886800f747d442e
#
# Builds the pinned build container and publishes it to GHCR.
#
# Triggers on any push touching Dockerfile, and on manual dispatch.
# The published tag is a content hash of Dockerfile, so re-running
# on an unchanged tree is a no-op — existence check against the
# GHCR package API via gh api uses the ambient GITHUB_TOKEN (no
# docker login needed until we actually need to push).
#
# Artifacts published: the container image itself, plus:
#   - SLSA v1 build provenance, via actions/attest-build-provenance
#   - cosign keyless signature on the image digest (sigstore OIDC)
#
# Verification (for any consumer of the image):
#
#   cosign verify \
#     ghcr.io/<owner>/<repo>/builder@sha256:<digest> \
#     --certificate-identity \
#       'https://github.com/<owner>/<repo>/.github/workflows/build-container.yml@refs/heads/main' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
#
#   gh attestation verify oci://ghcr.io/<owner>/<repo>/builder@sha256:<digest> \
#     --repo <owner>/<repo> \
#     --signer-workflow <owner>/<repo>/.github/workflows/build-container.yml

name: Build container

on:
  push:
    # Default branch name is resolved at scaffolding time by the
    # slsa-autotools init-container script from origin/HEAD on the
    # target repo — so this works whether the project uses main,
    # master, trunk, or anything else.
    branches: [master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-container.yml'
  workflow_dispatch:

# Default to no permissions; steps opt in to what they need.
permissions: {}

jobs:
  build:
    name: Build and publish pinned builder image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      # Needed by gh api and cosign to mint an OIDC token against
      # sigstore. Ephemeral, scoped to this run.
      id-token: write
      # Needed to publish the SLSA attestation.
      attestations: write
      # Needed to push the image to this repo's GHCR namespace.
      packages: write
      # checkout needs read. No write on the repo itself.
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Compute image tag from Dockerfile content
        id: tag
        run: |
          set -eu
          # Tag = first 16 chars of sha256(Dockerfile). Any edit to
          # the Dockerfile yields a new tag; old tags stay published
          # and remain verifiable.
          TAG=$(sha256sum Dockerfile | cut -c1-16)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed tag: ${TAG}"

      - name: Check if image already exists in GHCR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pipe potentially-attacker-controllable template contexts
          # through env rather than inlining them into shell — avoids
          # the "code injection via template expansion" class of
          # vulnerability (see zizmor template-injection audit).
          REPO_NAME:  ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          TAG:        ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          # Query the GitHub packages API (not the registry directly).
          # This uses the ambient GITHUB_TOKEN — no docker login needed
          # just to check existence. Keeps no-op runs fast and avoids
          # auth against the registry when we don't need it.
          #
          # users is resolved at scaffolding time by the
          # slsa-autotools init-container script. Users and orgs use
          # different API paths; we pin one at gen time rather than
          # branching at runtime.
          PKG_NAME="${REPO_NAME}%2Fbuilder"
          if gh api \
               "/users/${REPO_OWNER}/packages/container/${PKG_NAME}/versions" \
               --jq '.[].metadata.container.tags[]?' 2>/dev/null \
             | grep -qx "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ghcr.io/${REPOSITORY}/builder:${TAG} already published — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image not present in GHCR — will build and push."
          fi

      # Everything below is gated on steps.check.outputs.exists != 'true'.
      # docker login runs only when we're actually going to push.

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: Dockerfile
          push: true
          # Push both a content-hash tag (immutable) and :latest
          # (moves on every successful build). Consumers should
          # pin by digest — the tag is a readability affordance.
          tags: |
            ghcr.io/${{ github.repository }}/builder:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/builder:latest
          # Provenance: false — build-push-action's own provenance
          # feature injects an attestation into the image manifest
          # list, which changes the image digest on every build and
          # thwarts the idempotence story. We use
          # actions/attest-build-provenance below instead, which
          # stores the attestation out-of-band via GitHub's
          # attestations API (does not affect the image digest).
          provenance: false
          # sbom: false — same reasoning; can be added back as an
          # out-of-band attestation step if needed.
          sbom: false

      - name: Generate SLSA build provenance attestation
        if: steps.check.outputs.exists != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/builder
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        if: steps.check.outputs.exists != 'true'
        run: |
          set -euo pipefail
          # Pinned by SHA256. Same version as the sibling xz project
          # uses. Update together when bumping.
          COSIGN_VERSION=v3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          echo "${COSIGN_SHA256}  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign

      - name: Sign image with cosign (keyless, sigstore)
        if: steps.check.outputs.exists != 'true'
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          # Sign the immutable digest (not the tag) so the signature
          # binds to specific bytes. Stored as a sidecar in the same
          # registry namespace; verification finds it automatically
          # from the image reference.
          cosign sign \
            "ghcr.io/${{ github.repository }}/builder@${{ steps.push.outputs.digest }}"

      - name: Summary
        if: steps.check.outputs.exists != 'true'
        run: |
          {
            echo "### Published container image"
            echo ""
            echo "- **Image:** \`ghcr.io/${{ github.repository }}/builder\`"
            echo "- **Tag:** \`${{ steps.tag.outputs.tag }}\` (sha256 of Dockerfile, first 16 chars)"
            echo "- **Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo ""
            echo "Pin consumers to the digest, not the tag. The tag is for human legibility; the digest is what makes the pipeline reproducible."
          } >> "$GITHUB_STEP_SUMMARY"
